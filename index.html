<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高速バーコードスキャナー</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- ZXing Library for high-speed scanning -->
    <script type="text/javascript" src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        #video-container {
            position: relative;
            overflow: hidden;
            border-radius: 1rem;
            background: #000;
            aspect-ratio: 4 / 3;
        }
        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .scan-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            pointer-events: none;
        }
        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: #ef4444;
            box-shadow: 0 0 8px #ef4444;
            animation: scan 2s linear infinite;
        }
        @keyframes scan {
            0% { top: 10%; }
            50% { top: 90%; }
            100% { top: 10%; }
        }
        .flash-success {
            animation: flash 0.3s ease-out;
        }
        @keyframes flash {
            0% { background: rgba(34, 197, 94, 0.5); }
            100% { background: transparent; }
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col">

    <header class="p-4 bg-slate-800 shadow-lg flex justify-between items-center">
        <h1 class="text-xl font-bold flex items-center">
            <span class="mr-2">📷</span> 高速スキャナー
        </h1>
        <div id="status" class="text-xs px-2 py-1 rounded bg-yellow-600">準備中...</div>
    </header>

    <main class="flex-1 p-4 max-w-2xl mx-auto w-full space-y-4">
        
        <!-- Camera View -->
        <div id="video-container" class="shadow-2xl relative">
            <video id="video"></video>
            <div class="scan-overlay">
                <div class="scan-line"></div>
                <div id="flash-layer" class="absolute inset-0 pointer-events-none"></div>
            </div>
            <!-- Floating Indicator -->
            <div id="last-result-badge" class="absolute bottom-4 left-1/2 -translate-x-1/2 bg-green-600 text-white px-4 py-2 rounded-full font-mono font-bold shadow-xl hidden">
                00000000
            </div>
        </div>

        <!-- Controls -->
        <div class="flex gap-2">
            <button id="startButton" class="flex-1 bg-blue-600 hover:bg-blue-700 py-3 rounded-xl font-bold transition">カメラ起動</button>
            <button id="resetButton" class="bg-slate-700 hover:bg-slate-600 px-6 rounded-xl font-bold transition">クリア</button>
        </div>

        <!-- Result List -->
        <div class="bg-slate-800 rounded-xl p-4 flex-1 overflow-hidden flex flex-col border border-slate-700">
            <div class="flex justify-between items-center mb-2">
                <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider">読み取り履歴</h2>
                <button onclick="copyAll()" class="text-xs text-blue-400 hover:underline">すべてコピー</button>
            </div>
            <div id="results" class="space-y-2 overflow-y-auto max-h-60 font-mono">
                <div class="text-slate-500 text-center py-8">履歴はありません</div>
            </div>
        </div>
    </main>

    <script>
        const codeReader = new ZXing.BrowserMultiFormatReader();
        const videoElement = document.getElementById('video');
        const startButton = document.getElementById('startButton');
        const resetButton = document.getElementById('resetButton');
        const resultList = document.getElementById('results');
        const statusBadge = document.getElementById('status');
        const flashLayer = document.getElementById('flash-layer');
        const lastResultBadge = document.getElementById('last-result-badge');

        let isScanning = false;
        const scanHistory = new Set();

        async function init() {
            try {
                const videoInputDevices = await codeReader.listVideoInputDevices();
                statusBadge.innerText = "準備完了";
                statusBadge.className = "text-xs px-2 py-1 rounded bg-green-600";
                
                startButton.addEventListener('click', () => {
                    if (isScanning) {
                        stopScanner();
                    } else {
                        startScanner(videoInputDevices[videoInputDevices.length - 1].deviceId); // 背面カメラを優先
                    }
                });
            } catch (err) {
                console.error(err);
                statusBadge.innerText = "エラー: カメラが見つかりません";
                statusBadge.className = "text-xs px-2 py-1 rounded bg-red-600";
            }
        }

        function startScanner(deviceId) {
            isScanning = true;
            startButton.innerText = "停止";
            startButton.classList.replace('bg-blue-600', 'bg-red-600');

            codeReader.decodeFromVideoDevice(deviceId, 'video', (result, err) => {
                if (result) {
                    onSuccess(result.getText());
                }
                if (err && !(err instanceof ZXing.NotFoundException)) {
                    console.error(err);
                }
            });
        }

        function stopScanner() {
            isScanning = false;
            codeReader.reset();
            startButton.innerText = "カメラ起動";
            startButton.classList.replace('bg-red-600', 'bg-blue-600');
            lastResultBadge.classList.add('hidden');
        }

        function onSuccess(text) {
            // 短時間の連続読み取り重複防止（1秒間）
            if (this.lastText === text && Date.now() - this.lastTime < 1000) return;
            this.lastText = text;
            this.lastTime = Date.now();

            // UIフィードバック
            flashLayer.classList.add('flash-success');
            setTimeout(() => flashLayer.classList.remove('flash-success'), 300);
            
            lastResultBadge.innerText = text;
            lastResultBadge.classList.remove('hidden');

            // バイブレーション (モバイル用)
            if (navigator.vibrate) navigator.vibrate(100);

            // 履歴に追加
            if (!scanHistory.has(text)) {
                scanHistory.add(text);
                if (scanHistory.size === 1) resultList.innerHTML = '';
                
                const entry = document.createElement('div');
                entry.className = "bg-slate-700 p-3 rounded-lg flex justify-between items-center border-l-4 border-green-500 animate-slide-in";
                entry.innerHTML = `
                    <span class="font-bold text-lg">${text}</span>
                    <span class="text-[10px] text-slate-400">${new Date().toLocaleTimeString()}</span>
                `;
                resultList.prepend(entry);
            }
        }

        resetButton.addEventListener('click', () => {
            scanHistory.clear();
            resultList.innerHTML = '<div class="text-slate-500 text-center py-8">履歴はありません</div>';
            lastResultBadge.classList.add('hidden');
        });

        function copyAll() {
            const text = Array.from(scanHistory).join('\n');
            if (!text) return;
            
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            
            alert('コピーしました！');
        }

        init();
    </script>

    <style>
        .animate-slide-in {
            animation: slideIn 0.2s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</body>
</html>
