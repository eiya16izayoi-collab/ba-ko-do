<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>バーコード一括生成ツール (ランダム対応版)</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- JsBarcode for barcode generation -->
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        /* A4 Print Styles */
        @media print {
            body {
                background: white;
                margin: 0;
                padding: 0;
            }
            .no-print {
                display: none !important;
            }
            .page-break {
                page-break-after: always;
            }
            .a4-preview {
                box-shadow: none !important;
                margin: 0 !important;
                padding: 10mm !important;
                width: 100% !important;
            }
        }
        
        .barcode-item {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            border: 1px dashed #ccc;
            border-radius: 8px;
            background: #fff;
        }

        /* Preview container styling */
        .a4-preview {
            width: 210mm;
            min-height: 297mm;
            padding: 10mm;
            margin: 20px auto;
            background: white;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            align-content: start;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <!-- UI Controls (Hidden during print) -->
    <div class="no-print bg-white shadow-lg p-6 mb-8 max-w-5xl mx-auto mt-8 rounded-2xl border border-gray-200">
        <h1 class="text-2xl font-bold mb-6 text-gray-800 flex items-center">
            <span class="mr-2">📊</span> バーコード一括作成ツール
        </h1>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
            <div class="space-y-4">
                <h2 class="font-semibold text-blue-600 border-b pb-1">1. 生成設定</h2>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">生成モード</label>
                    <select id="mode" class="w-full border rounded-md p-2 bg-gray-50 focus:ring-2 focus:ring-blue-500" onchange="toggleMode()">
                        <option value="random">完全ランダム</option>
                        <option value="sequence">連番（指定番号から）</option>
                    </select>
                </div>
                <div id="startNumContainer" class="hidden">
                    <label class="block text-sm font-medium text-gray-700 mb-1">開始番号</label>
                    <input type="number" id="startNum" value="100001" class="w-full border rounded-md p-2 focus:ring-2 focus:ring-blue-500">
                </div>
                <div id="digitContainer">
                    <label class="block text-sm font-medium text-gray-700 mb-1">ランダム桁数</label>
                    <input type="number" id="digits" value="8" min="4" max="12" class="w-full border rounded-md p-2 focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">生成個数</label>
                    <input type="number" id="count" value="12" min="1" max="100" class="w-full border rounded-md p-2 focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <div class="space-y-4">
                <h2 class="font-semibold text-green-600 border-b pb-1">2. デザイン設定</h2>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">バーコード形式</label>
                    <select id="format" class="w-full border rounded-md p-2 bg-gray-50">
                        <option value="CODE128">CODE128 (英数字対応)</option>
                        <option value="EAN13">JAN/EAN-13 (数字のみ・13桁)</option>
                        <option value="CODE39">CODE39</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">列数 (1行あたりの枚数)</label>
                    <input type="number" id="columns" value="3" min="1" max="5" class="w-full border rounded-md p-2">
                </div>
            </div>

            <div class="flex flex-col justify-end space-y-3">
                <button onclick="generateBarcodes()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl transition duration-200 shadow-md">
                    🔄 バーコードを再生成
                </button>
                <button onclick="window.print()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-xl transition duration-200 shadow-md">
                    🖨️ 印刷 / PDF保存
                </button>
            </div>
        </div>
        
        <div class="text-xs text-gray-400 bg-gray-50 p-3 rounded-lg">
            <p>※ランダムモードでは、ボタンを押すたびに異なる数字が選ばれます。</p>
            <p>※JAN13形式の場合、桁数は自動的に調整されます。</p>
        </div>
    </div>

    <!-- Page Container -->
    <div id="barcodePage" class="a4-preview shadow-2xl mb-20">
        <!-- Barcodes will be generated here -->
    </div>

    <script>
        function toggleMode() {
            const mode = document.getElementById('mode').value;
            const startNumContainer = document.getElementById('startNumContainer');
            const digitContainer = document.getElementById('digitContainer');
            
            if (mode === 'sequence') {
                startNumContainer.classList.remove('hidden');
                digitContainer.classList.add('hidden');
            } else {
                startNumContainer.classList.add('hidden');
                digitContainer.classList.remove('hidden');
            }
        }

        function getRandomString(length) {
            let result = '';
            const characters = '0123456789';
            for (let i = 0; i < length; i++) {
                result += characters.charAt(Math.floor(Math.random() * characters.length));
            }
            return result;
        }

        function generateBarcodes() {
            const container = document.getElementById('barcodePage');
            const mode = document.getElementById('mode').value;
            const count = parseInt(document.getElementById('count').value);
            const format = document.getElementById('format').value;
            const columns = document.getElementById('columns').value;
            const digits = parseInt(document.getElementById('digits').value);
            const startNum = parseInt(document.getElementById('startNum').value);

            // Update grid layout
            container.style.gridTemplateColumns = `repeat(${columns}, 1fr)`;
            
            // Clear existing
            container.innerHTML = '';

            const usedCodes = new Set();

            for (let i = 0; i < count; i++) {
                let currentVal;
                
                if (mode === 'random') {
                    // ユニークなランダム値を生成
                    do {
                        currentVal = getRandomString(format === 'EAN13' ? 12 : digits);
                    } while (usedCodes.has(currentVal));
                    usedCodes.add(currentVal);
                } else {
                    currentVal = (startNum + i).toString();
                }
                
                // Create item wrapper
                const itemDiv = document.createElement('div');
                itemDiv.className = 'barcode-item';
                
                // Create SVG element
                const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                svg.id = `barcode-${i}`;
                itemDiv.appendChild(svg);
                
                container.appendChild(itemDiv);

                try {
                    JsBarcode(`#barcode-${i}`, currentVal, {
                        format: format,
                        width: 1.8,
                        height: 50,
                        displayValue: true,
                        fontSize: 14,
                        margin: 5,
                        background: "transparent"
                    });
                } catch (e) {
                    console.error("Error:", currentVal, e);
                    itemDiv.innerHTML = `<span class="text-red-500 text-[10px]">Error: ${currentVal}</span>`;
                }
            }
        }

        // Initial generation
        window.onload = generateBarcodes;
    </script>
</body>
</html>
